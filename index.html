    <!-- 應用程式邏輯 (Vanilla JS) -->
    <script>
        // --- 備用資料庫 (避免 API 失敗時完全無資料) ---
        let pokemonDB = [
            { 
                name: "振翼髮", types: ["幽靈", "妖精"], stats: { hp: 55, atk: 55, def: 55, spa: 135, spd: 135, spe: 135 }, 
                abilities: [{name: "古代活性", isHidden: false}], sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/987.png" 
            },
            { 
                name: "熾焰咆哮虎", types: ["火", "惡"], stats: { hp: 95, atk: 115, def: 90, spa: 80, spd: 90, spe: 60 }, 
                abilities: [{name: "猛火", isHidden: false}, {name: "威嚇", isHidden: true}], sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/727.png" 
            },
            { 
                name: "武道熊師 (連擊流)", types: ["格鬥", "水"], stats: { hp: 100, atk: 130, def: 100, spa: 63, spd: 60, spe: 97 }, 
                abilities: [{name: "無形拳", isHidden: false}], sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/892-rapid-strike.png" 
            }
        ];

        const typeColors = {
            "一般": "bg-gray-400", "火": "bg-red-500", "水": "bg-blue-500", "草": "bg-green-500", "電": "bg-yellow-400 text-slate-800", 
            "冰": "bg-cyan-300 text-slate-800", "格鬥": "bg-orange-600", "毒": "bg-purple-500", "地面": "bg-yellow-600", "飛行": "bg-indigo-300", 
            "超能力": "bg-pink-500", "蟲": "bg-lime-500", "岩石": "bg-yellow-700", "幽靈": "bg-indigo-700", "龍": "bg-indigo-600", 
            "惡": "bg-slate-700", "鋼": "bg-slate-400", "妖精": "bg-pink-400"
        };

        let dexIndex = 0;
        let atkIndex = 0;
        let defIndex = 1;

        // --- 核心運算邏輯 (50級基準, 32點IV) ---
        function calculateStat(base, ev, iv, natureMod, isHp) {
            const level = 50;
            if (isHp) {
                return Math.floor(((2 * base + iv + Math.floor(ev / 4)) * level) / 100) + level + 10;
            } else {
                const raw = Math.floor(((2 * base + iv + Math.floor(ev / 4)) * level) / 100) + 5;
                return Math.floor(raw * natureMod);
            }
        }

        function calculateDamage(params) {
            const {
                level, power,
                atkStat, atkStage, atkItem, isBurned, isPhysical,
                defStat, defStage, defItem,
                effectiveness, stab, weather, isCrit
            } = params;

            if (power === 0) return { minDmg: 0, maxDmg: 0 };

            // 1. 階級計算 (擊中要害時無視不利階級)
            let actualAtkStage = atkStage;
            let actualDefStage = defStage;

            if (isCrit) {
                if (actualAtkStage < 0) actualAtkStage = 0;
                if (actualDefStage > 0) actualDefStage = 0;
            }

            let atkMod = actualAtkStage >= 0 ? (2 + actualAtkStage) / 2 : 2 / (2 - actualAtkStage);
            let defMod = actualDefStage >= 0 ? (2 + actualDefStage) / 2 : 2 / (2 - actualDefStage);

            let finalAtk = Math.floor(atkStat * atkMod);
            let finalDef = Math.floor(defStat * defMod);

            // 2. 影響數值的道具
            if (atkItem === '1.5') finalAtk = Math.floor(finalAtk * 1.5); 
            if (defItem === '1.5' && !isPhysical) finalDef = Math.floor(finalDef * 1.5); 
            if (defItem === '1.5e') finalDef = Math.floor(finalDef * 1.5); 

            // 3. 基礎傷害公式
            let baseDmg = Math.floor(Math.floor((Math.floor((2 * level) / 5 + 2) * power * finalAtk) / finalDef) / 50) + 2;

            // 4. 環境與狀態修正
            baseDmg = Math.floor(baseDmg * weather);
            if (isCrit) baseDmg = Math.floor(baseDmg * 1.5);

            let minDmg = Math.floor(baseDmg * 0.85);
            let maxDmg = Math.floor(baseDmg * 1.00);

            // STAB & 屬性相剋
            minDmg = Math.floor(minDmg * stab);
            maxDmg = Math.floor(maxDmg * stab);
            minDmg = Math.floor(minDmg * effectiveness);
            maxDmg = Math.floor(maxDmg * effectiveness);

            // 燒傷 (物理)
            if (isBurned && isPhysical) {
                minDmg = Math.floor(minDmg * 0.5);
                maxDmg = Math.floor(maxDmg * 0.5);
            }

            // 影響傷害的道具
            if (atkItem === '1.3') { 
                minDmg = Math.floor(minDmg * 1.3);
                maxDmg = Math.floor(maxDmg * 1.3);
            }
            if (atkItem === '1.2') { 
                minDmg = Math.floor(minDmg * 1.2);
                maxDmg = Math.floor(maxDmg * 1.2);
            }

            return { minDmg, maxDmg };
        }

        // --- 自動名稱修飾邏輯 ---
        function formatVariantName(engName, baseZhName) {
            if (!engName.includes('-')) return baseZhName;
            if (engName.includes('-mega-x')) return '超級' + baseZhName + ' X';
            if (engName.includes('-mega-y')) return '超級' + baseZhName + ' Y';
            if (engName.includes('-mega')) return '超級' + baseZhName;
            if (engName.includes('-primal')) return '原始' + baseZhName;
            if (engName.includes('-alola')) return baseZhName + ' (阿羅拉)';
            if (engName.includes('-galar')) return baseZhName + ' (伽勒爾)';
            if (engName.includes('-hisui')) return baseZhName + ' (洗翠)';
            if (engName.includes('-paldea')) return baseZhName + ' (帕底亞)';
            if (engName.includes('-rapid-strike')) return baseZhName + ' (連擊流)';
            if (engName.includes('-hearthflame')) return baseZhName + ' (火灶面)';
            if (engName.includes('-wellspring')) return baseZhName + ' (水井面)';
            if (engName.includes('-cornerstone')) return baseZhName + ' (礎石面)';
            if (engName.includes('-crowned')) return baseZhName + ' (劍王/盾王)';
            if (engName.includes('-therian')) return baseZhName + ' (靈獸)';
            if (engName.includes('-origin')) return baseZhName + ' (起源)';
            return baseZhName + ' (' + engName.split('-').slice(1).join(' ') + ')';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();

            // --- UI 初始化 ---
            const viewPokedex = document.getElementById('view-pokedex');
            const viewCalculator = document.getElementById('view-calculator');
            const tabPokedex = document.getElementById('tab-pokedex');
            const tabCalculator = document.getElementById('tab-calculator');

            const dexSearch = document.getElementById('pokedex-search');
            const atkSearch = document.getElementById('calc-atk-search');
            const defSearch = document.getElementById('calc-def-search');

            // 自動完成選單邏輯
            function setupAutocomplete(input, dropdownId, setIndexCb, initialIndex) {
                const dropdown = document.getElementById(dropdownId);
                input.value = pokemonDB[initialIndex] ? pokemonDB[initialIndex].name : "";
                
                input.addEventListener('input', (e) => {
                    const val = e.target.value.trim().toLowerCase();
                    dropdown.innerHTML = '';
                    
                    const filtered = val 
                        ? pokemonDB.map((m, i) => ({...m, idx: i})).filter(m => m.name.toLowerCase().includes(val)).slice(0, 50)
                        : pokemonDB.map((m, i) => ({...m, idx: i})).slice(0, 50);

                    if (filtered.length === 0) {
                        dropdown.innerHTML = '<div class="p-3 text-slate-500 text-sm text-center">找不到寶可夢</div>';
                    } else {
                        filtered.forEach(mon => {
                            const div = document.createElement('div');
                            div.className = "p-2 border-b border-slate-100 hover:bg-blue-50 cursor-pointer flex items-center gap-3";
                            div.innerHTML = `<img src="${mon.sprite}" class="w-8 h-8 object-contain bg-slate-100 rounded-full"><span class="font-bold text-slate-700 text-sm">${mon.name}</span>`;
                            div.addEventListener('click', () => {
                                input.value = mon.name;
                                dropdown.classList.add('hidden');
                                setIndexCb(mon.idx);
                            });
                            dropdown.appendChild(div);
                        });
                    }
                    dropdown.classList.remove('hidden');
                });

                input.addEventListener('focus', () => input.dispatchEvent(new Event('input')));
                
                document.addEventListener('click', (e) => {
                    if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                        dropdown.classList.add('hidden');
                    }
                });
            }

            function renderPokedex() {
                const mon = pokemonDB[dexIndex];
                if(!mon) return;
                
                document.getElementById('dex-sprite').src = mon.sprite;
                document.getElementById('dex-name').innerText = mon.name;
                document.getElementById('dex-types').innerHTML = mon.types.map(t => 
                    `<span class="${typeColors[t] || 'bg-slate-500 text-white'} px-3 py-1 rounded-full text-xs font-bold shadow-sm">${t}</span>`
                ).join('');

                // 渲染特性
                const abilitiesHtml = mon.abilities.map(a =>
                    `<span class="px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm ${a.isHidden ? 'bg-purple-50 text-purple-700 border border-purple-200' : 'bg-slate-50 text-slate-700 border border-slate-200'}">
                        ${a.name} ${a.isHidden ? '<span class="text-[10px] ml-1 opacity-70">(隱藏)</span>' : ''}
                    </span>`
                ).join('');
                document.getElementById('dex-abilities').innerHTML = abilitiesHtml || '<span class="text-xs text-slate-400">無資料</span>';

                const statsHtml = Object.entries(mon.stats).map(([key, base]) => {
                    const label = key.toUpperCase();
                    const isHp = key === 'hp';
                    const min = calculateStat(base, 0, 0, 1.0, isHp);
                    const max = calculateStat(base, 252, 31, isHp ? 1.0 : 1.1, isHp);
                    const color = { hp: 'bg-green-500', atk: 'bg-red-500', def: 'bg-orange-500', spa: 'bg-blue-500', spd: 'bg-purple-500', spe: 'bg-pink-500' }[key];
                    const percent = Math.min((max / 260) * 100, 100);

                    return `
                        <div class="flex flex-col">
                            <div class="flex justify-between items-end text-xs mb-1">
                                <div class="flex items-center gap-2">
                                    <span class="font-black text-slate-700 w-8">${label}</span>
                                    <span class="text-slate-400 font-mono text-[10px]">種族 ${base}</span>
                                </div>
                                <span class="font-bold text-slate-600 font-mono">${min} <span class="text-slate-300">~</span> ${max}</span>
                            </div>
                            <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full ${color}" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    `;
                }).join('');
                document.getElementById('dex-stats').innerHTML = statsHtml;
            }

            function updateCalculator() {
                const atkMon = pokemonDB[atkIndex];
                const defMon = pokemonDB[defIndex];
                if(!atkMon || !defMon) return;

                // --- 攻擊方數值 ---
                const atkStatKey = document.getElementById('calc-atk-stat').value;
                const isPhysical = atkStatKey === 'atk';
                const atkEv = parseInt(document.getElementById('calc-atk-ev').value) || 0;
                const atkIv = parseInt(document.getElementById('calc-atk-iv').value) || 0;
                const atkNature = parseFloat(document.getElementById('calc-atk-nature').value);
                const actualAtkStat = calculateStat(atkMon.stats[atkStatKey], atkEv, atkIv, atkNature, false);
                document.getElementById('calc-atk-actual').innerText = actualAtkStat;

                const atkStage = parseInt(document.getElementById('calc-atk-stage').value);
                const atkItem = document.getElementById('calc-atk-item').value;
                const isBurned = document.getElementById('calc-atk-burn').checked;

                // --- 防禦方數值 ---
                const defHpEv = parseInt(document.getElementById('calc-def-hp-ev').value) || 0;
                const defHpIv = parseInt(document.getElementById('calc-def-hp-iv').value) || 0;
                const defStatKey = document.getElementById('calc-def-stat').value;
                const defEv = parseInt(document.getElementById('calc-def-ev').value) || 0;
                const defIv = parseInt(document.getElementById('calc-def-iv').value) || 0;
                const defNature = parseFloat(document.getElementById('calc-def-nature').value);
                
                const actualDefHp = calculateStat(defMon.stats.hp, defHpEv, defHpIv, 1.0, true);
                const actualDefStat = calculateStat(defMon.stats[defStatKey], defEv, defIv, defNature, false);
                
                document.getElementById('calc-def-hp-actual').innerText = actualDefHp;
                document.getElementById('calc-def-actual').innerText = actualDefStat;

                const defStage = parseInt(document.getElementById('calc-def-stage').value);
                const defItem = document.getElementById('calc-def-item').value;

                // --- 招式與環境 ---
                const power = parseInt(document.getElementById('calc-move-power').value) || 0;
                const effectiveness = parseFloat(document.getElementById('calc-effectiveness').value);
                const stab = parseFloat(document.getElementById('calc-stab').value);
                const fieldBoost = parseFloat(document.getElementById('calc-field-boost').value);
                const isCrit = document.getElementById('calc-crit').checked;

                // --- 執行精算 ---
                const params = {
                    level: 50, power,
                    atkStat: actualAtkStat, atkStage, atkItem, isBurned, isPhysical,
                    defStat: actualDefStat, defStage, defItem,
                    effectiveness, stab, weather: fieldBoost, isCrit
                };

                const { minDmg, maxDmg } = calculateDamage(params);
                
                const minPct = actualDefHp > 0 ? ((minDmg / actualDefHp) * 100).toFixed(1) : 0;
                const maxPct = actualDefHp > 0 ? ((maxDmg / actualDefHp) * 100).toFixed(1) : 0;

                document.getElementById('calc-dmg-min').innerText = minDmg;
                document.getElementById('calc-dmg-max').innerText = maxDmg;
                document.getElementById('calc-pct-min').innerText = minPct;
                document.getElementById('calc-pct-max').innerText = maxPct;

                const badge = document.getElementById('calc-result-badge');
                if (minDmg >= actualDefHp) {
                    badge.innerText = "100% 確一 (OHKO)";
                    badge.className = "px-2 py-0.5 rounded text-xs font-bold bg-red-500 text-white shadow-sm";
                } else if (maxDmg >= actualDefHp) {
                    badge.innerText = "亂數一擊殺 (Chance OHKO)";
                    badge.className = "px-2 py-0.5 rounded text-xs font-bold bg-yellow-500 text-white shadow-sm";
                } else if (minDmg * 2 >= actualDefHp) {
                    badge.innerText = "確定二擊殺 (2HKO)";
                    badge.className = "px-2 py-0.5 rounded text-xs font-bold bg-orange-500 text-white shadow-sm";
                } else {
                    badge.innerText = "三擊以上";
                    badge.className = "px-2 py-0.5 rounded text-xs font-bold bg-slate-600 text-white shadow-sm";
                }
            }

            // 綁定所有參數輸入觸發更新
            const calcInputs = [
                'calc-atk-stat', 'calc-atk-ev', 'calc-atk-iv', 'calc-atk-nature', 'calc-atk-stage', 'calc-atk-item', 'calc-atk-burn',
                'calc-def-hp-ev', 'calc-def-hp-iv', 'calc-def-stat', 'calc-def-ev', 'calc-def-iv', 'calc-def-nature', 'calc-def-stage', 'calc-def-item',
                'calc-move-power', 'calc-field-boost', 'calc-effectiveness', 'calc-stab', 'calc-crit'
            ];
            calcInputs.forEach(id => document.getElementById(id).addEventListener('input', updateCalculator));

            // 切換視圖
            tabPokedex.addEventListener('click', () => {
                viewPokedex.classList.remove('hidden');
                viewCalculator.classList.add('hidden');
                tabPokedex.classList.replace('text-slate-400', 'text-blue-600');
                tabCalculator.classList.replace('text-blue-600', 'text-slate-400');
            });
            tabCalculator.addEventListener('click', () => {
                viewPokedex.classList.add('hidden');
                viewCalculator.classList.remove('hidden');
                tabCalculator.classList.replace('text-slate-400', 'text-blue-600');
                tabPokedex.classList.replace('text-blue-600', 'text-slate-400');
                updateCalculator();
            });

            // 載入階段 UI 更新
            dexSearch.placeholder = "正在分析全球進化鏈與特性...";

            // 抓取線上所有寶可夢並解析進化樹與特性
            try {
                const query = `
                query {
                  pokemon_v2_pokemon(order_by: {id: asc}) {
                    id name is_default
                    pokemon_v2_pokemonstats { base_stat pokemon_v2_stat { name } }
                    pokemon_v2_pokemontypes { pokemon_v2_type { name } }
                    pokemon_v2_pokemonspecy {
                      id
                      pokemon_v2_pokemonspeciesnames(where: {language_id: {_eq: 4}}) { name }
                    }
                    pokemon_v2_pokemonabilities {
                      is_hidden
                      pokemon_v2_ability {
                        name
                        pokemon_v2_abilitynames(where: {language_id: {_eq: 4}}) { name }
                      }
                    }
                  }
                  pokemon_v2_pokemonspecies {
                    id evolves_from_species_id
                  }
                }`;
                const response = await fetch('https://beta.pokeapi.co/graphql/v1beta', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                
                const { data } = await response.json();
                
                const preEvoSpeciesIds = new Set();
                data.pokemon_v2_pokemonspecies.forEach(s => {
                    if (s.evolves_from_species_id) preEvoSpeciesIds.add(s.evolves_from_species_id);
                });

                const typeTranslations = {
                    "normal": "一般", "fire": "火", "water": "水", "grass": "草", "electric": "電",
                    "ice": "冰", "fighting": "格鬥", "poison": "毒", "ground": "地面", "flying": "飛行",
                    "psychic": "超能力", "bug": "蟲", "rock": "岩石", "ghost": "幽靈", "dragon": "龍",
                    "dark": "惡", "steel": "鋼", "fairy": "妖精"
                };

                const invalidSuffixes = ['-gmax', '-totem', '-cap', '-cosplay', '-star', '-spiky', '-busted', '-resolute', '-ash', '-hangry', '-dada', '-gulping', '-gorging', '-terastal', '-stellar'];

                const finalPokemonList = [];
                
                data.pokemon_v2_pokemon.forEach(p => {
                    const speciesId = p.pokemon_v2_pokemonspecy.id;
                    if (preEvoSpeciesIds.has(speciesId)) return;
                    if (invalidSuffixes.some(suffix => p.name.includes(suffix))) return;

                    const zhNameObj = p.pokemon_v2_pokemonspecy.pokemon_v2_pokemonspeciesnames[0];
                    const baseZhName = zhNameObj ? zhNameObj.name : p.name;
                    const finalName = p.is_default ? baseZhName : formatVariantName(p.name, baseZhName);
                    
                    const types = p.pokemon_v2_pokemontypes.map(t => typeTranslations[t.pokemon_v2_type.name] || t.pokemon_v2_type.name);
                    const statsArr = p.pokemon_v2_pokemonstats;

                    const abilities = p.pokemon_v2_pokemonabilities.map(a => {
                        const zhAbility = a.pokemon_v2_ability.pokemon_v2_abilitynames[0];
                        return {
                            name: zhAbility ? zhAbility.name : a.pokemon_v2_ability.name,
                            isHidden: a.is_hidden
                        };
                    });

                    finalPokemonList.push({
                        name: finalName,
                        types,
                        abilities,
                        stats: {
                            hp: statsArr.find(s => s.pokemon_v2_stat.name === 'hp').base_stat,
                            atk: statsArr.find(s => s.pokemon_v2_stat.name === 'attack').base_stat,
                            def: statsArr.find(s => s.pokemon_v2_stat.name === 'defense').base_stat,
                            spa: statsArr.find(s => s.pokemon_v2_stat.name === 'special-attack').base_stat,
                            spd: statsArr.find(s => s.pokemon_v2_stat.name === 'special-defense').base_stat,
                            spe: statsArr.find(s => s.pokemon_v2_stat.name === 'speed').base_stat,
                        },
                        sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png`
                    });
                });

                pokemonDB = finalPokemonList;

                dexSearch.placeholder = `搜尋 ${pokemonDB.length} 隻對戰型態...`;
                atkSearch.placeholder = "搜尋攻擊方...";
                defSearch.placeholder = "搜尋防禦方...";
                
                setupAutocomplete(dexSearch, 'pokedex-dropdown', (idx) => { dexIndex = idx; renderPokedex(); }, 0);
                setupAutocomplete(atkSearch, 'calc-atk-dropdown', (idx) => { atkIndex = idx; updateCalculator(); }, 0);
                setupAutocomplete(defSearch, 'calc-def-dropdown', (idx) => { defIndex = idx; updateCalculator(); }, pokemonDB.length > 1 ? 1 : 0);
                
                renderPokedex();
                updateCalculator();

            } catch (err) {
                console.error("API 載入失敗，使用備用資料庫", err);
                dexSearch.placeholder = "搜尋 (目前為離線備用模式)";
                setupAutocomplete(dexSearch, 'pokedex-dropdown', (idx) => { dexIndex = idx; renderPokedex(); }, 0);
                setupAutocomplete(atkSearch, 'calc-atk-dropdown', (idx) => { atkIndex = idx; updateCalculator(); }, 0);
                setupAutocomplete(defSearch, 'calc-def-dropdown', (idx) => { defIndex = idx; updateCalculator(); }, 1);
                renderPokedex();
                updateCalculator();
            }
        });
    </script>
    
    <!-- PWA Service Worker 註冊 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA: Service Worker 註冊成功', reg))
                    .catch(err => console.log('PWA: Service Worker 註冊失敗', err));
            });
        }
    </script>
</body>
